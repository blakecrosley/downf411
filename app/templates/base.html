<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Short Game{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body x-data="shortGame()" x-init="init()">

<!-- Nav -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">SHORT GAME</a>
        <div class="d-flex align-items-center gap-3">
            <span class="nav-equity" id="nav-equity"
                  hx-get="/v1/partials/nav-stats"
                  hx-trigger="load, every 30s"
                  hx-swap="innerHTML">
                --
            </span>
            <span id="nav-pnl"
                  hx-get="/v1/partials/pnl-badge"
                  hx-trigger="load, every 30s"
                  hx-swap="innerHTML">
            </span>
        </div>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/briefing">Briefing</a></li>
                <li class="nav-item"><a class="nav-link" href="/history">History</a></li>
                <li class="nav-item"><a class="nav-link" href="/profile">Profile</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Milestone progress bar -->
<div class="milestone-bar" id="milestone-bar"
     hx-get="/v1/partials/milestone-bar"
     hx-trigger="load, every 60s"
     hx-swap="innerHTML">
</div>

<!-- Alert toast container -->
<div class="toast-container position-fixed top-0 end-0 p-3" id="alert-toasts"
     hx-get="/v1/partials/alerts"
     hx-trigger="load, every 30s"
     hx-swap="innerHTML">
</div>

<!-- Main content -->
<main class="container-fluid py-3">
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
