{% extends "base.html" %}
{% block title %}Open Short — Short Game{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h4 class="mb-3">Open Short Position</h4>

        <div x-data="tradeForm()" x-init="initFromUrl()">
            <div class="card bg-dark border-secondary">
                <div class="card-body">
                    <!-- Ticker -->
                    <div class="mb-3">
                        <label class="form-label">Ticker</label>
                        <input type="text" class="form-control" x-model="ticker"
                               pattern="^[A-Z]{1,5}$" placeholder="DUOL" maxlength="5"
                               @input="ticker = ticker.toUpperCase()">
                    </div>

                    <!-- Amount -->
                    <div class="mb-3">
                        <label class="form-label">Amount ($)</label>
                        <input type="number" class="form-control" x-model.number="amount"
                               min="1" step="1" placeholder="500"
                               @input="calcShares()">
                        <div class="form-text">Default: 5% of equity</div>
                    </div>

                    <!-- Shares (calculated) -->
                    <div class="mb-3">
                        <label class="form-label">Shares</label>
                        <input type="number" class="form-control" x-model.number="shares"
                               min="1" step="1" @input="calcAmount()">
                    </div>

                    <!-- Margin display -->
                    <div class="mb-3">
                        <div class="d-flex justify-content-between text-muted">
                            <span>Estimated margin:</span>
                            <span x-text="'$' + marginRequired.toFixed(2)"></span>
                        </div>
                    </div>

                    <!-- Kelly suggestion (shown after 20 trades) -->
                    <template x-if="kellyPct !== null">
                        <div class="alert alert-info py-2 small">
                            Kelly suggests <span x-text="kellyPct + '%'"></span> of equity
                            (<span x-text="'$' + kellyAmount.toFixed(0)"></span>)
                        </div>
                    </template>

                    <!-- Review Order button -->
                    <button class="btn btn-warning w-100"
                            @click="preflight()"
                            :disabled="!ticker || shares < 1 || loading">
                        <span x-show="loading" class="spinner-border spinner-border-sm me-1"></span>
                        Review Order
                    </button>

                    <!-- Preflight error -->
                    <template x-if="preflightError">
                        <div class="alert alert-danger mt-3 py-2" x-text="preflightError"></div>
                    </template>
                </div>
            </div>

            <!-- Confirmation Modal -->
            <div class="modal fade" id="confirmModal" tabindex="-1" x-ref="confirmModal">
                <div class="modal-dialog">
                    <div class="modal-content bg-dark border-secondary">
                        <div class="modal-header">
                            <h5 class="modal-title">Confirm Short</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <p>Short <strong x-text="shares"></strong> shares of
                               <strong x-text="ticker"></strong> at ~$<span x-text="preflightData.price || '--'"></span></p>
                            <div class="d-flex flex-column gap-2 mb-3">
                                <div class="d-flex justify-content-between">
                                    <span class="text-muted">Margin required:</span>
                                    <span x-text="'$' + (preflightData.margin_required || 0).toFixed(2)"></span>
                                </div>
                                <div class="d-flex justify-content-between">
                                    <span class="text-muted">Stop loss:</span>
                                    <span x-text="'$' + (preflightData.stop_loss || '--')"></span>
                                </div>
                                <div class="d-flex justify-content-between">
                                    <span class="text-muted">Target:</span>
                                    <span x-text="'$' + (preflightData.target || '--')"></span>
                                </div>
                                <div class="d-flex justify-content-between">
                                    <span class="text-muted">Squeeze level:</span>
                                    <span :class="squeezeBadgeClass(preflightData.squeeze_level)"
                                          x-text="preflightData.squeeze_level || '--'"></span>
                                </div>
                            </div>
                            <div class="alert py-2"
                                 :class="preflightData.approved ? 'alert-success' : 'alert-danger'">
                                <strong x-text="preflightData.approved ? 'APPROVED' : 'VETOED'"></strong>:
                                <span x-text="preflightData.reason"></span>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="button" class="btn btn-warning"
                                    @click="executeShort()"
                                    :disabled="!preflightData.approved || executing">
                                <span x-show="executing" class="spinner-border spinner-border-sm me-1"></span>
                                Confirm Short
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
